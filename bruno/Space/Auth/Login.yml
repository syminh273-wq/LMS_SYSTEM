info:
  name: Space Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/space/account/login/"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data.access) {
          bru.setEnvVar("space_access_token", data.access);
        }
