info:
  name: Space Register
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/space/account/register/"
  body:
    type: json
    data: |-
      {
       "email": "{{email}}",
        "password": "{{password}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
