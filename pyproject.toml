[project]
name = "lms-backend"
version = "0.1.0"
description = "Learning Management System built with Django + Cassandra"
authors = [{ name = "hsminh" }]
readme = "README.md"
requires-python = ">=3.9,<4.0"
dependencies = [
    "Django>=4.0,<5.0",
    "cassandra-driver",
    "python-decouple==3.8",
    "django-cassandra-engine",
    "djangorestframework",
    "djangorestframework-simplejwt",
    "django-filter",
    "channels",
    "daphne",
    "django-cors-headers",
    "boto3",
    "qrcode==8.2",
    "firebase-admin",
]

[project.optional-dependencies]
dev = [
    "ipython",
]

[tool.poetry]
package-mode = false

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
