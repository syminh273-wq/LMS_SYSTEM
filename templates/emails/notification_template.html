<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #111827;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 20px;
        }
        .logo {
            margin-bottom: 32px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #4f46e5;
        }
        .card {
            background: #ffffff;
            border: 1px solid #f3f4f6;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            line-height: 32px;
            margin: 0 0 16px;
            color: #111827;
        }
        p {
            font-size: 16px;
            line-height: 24px;
            margin: 0 0 24px;
            color: #4b5563;
        }
        .message-box {
            background-color: #f9fafb;
            border-radius: 12px;
            padding: 24px;
            margin: 32px 0;
            color: #111827;
            border-left: 4px solid #4f46e5;
        }
        .btn-container {
            margin: 32px 0;
        }
        .button {
            display: inline-block;
            background-color: #4f46e5;
            color: #ffffff !important;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }
        .footer {
            margin-top: 32px;
            text-align: center;
        }
        .footer-text {
            font-size: 14px;
            line-height: 20px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">LMS SYSTEM</div>
        <div class="card">
            <h1>{{ title }}</h1>
            <p>Hello {{ user_name|default:"there" }},</p>
            
            <div class="message-box">
                {{ message }}
            </div>
            
            {% if action_url %}
            <div class="btn-container">
                <a href="{{ action_url }}" class="button">{{ action_text|default:"View Details" }}</a>
            </div>
            {% endif %}
            
            <p style="font-size: 14px; margin-bottom: 0; color: #6b7280;">This is an automated notification from your LMS dashboard.</p>
        </div>
        <div class="footer">
            <div class="footer-text">
                &copy; 2026 LMS Platform, Inc. <br>
                Empowering the future of digital learning.
            </div>
        </div>
    </div>
</body>
</html>
